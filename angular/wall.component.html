<app-options-bar>
  <div left><app-crumbs [crumbs]="crumbs" /></div>
  <div right>
    <button type="button" class="btn btn-sm btn-outline-secondary" (click)="refresh()"><i class="fas fa-refresh"></i></button>
  </div>
</app-options-bar>
<div class="row">
  @if (showLoading) {
    <app-loading count="6" />
  } @else {
    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <textarea
          class="form-control mb-3"
          rows="3"
          placeholder="What's on your mind?"
          [(ngModel)]="newPostText"
          [disabled]="posting"
        ></textarea>
        <div class="d-flex justify-content-end">
          <button class="btn btn-primary" [disabled]="!newPostText || posting" (click)="addPost()">Post</button>
        </div>
      </div>
    </div>

    @if (displayList.length === 0) {
      <div class="text-center text-muted py-5">
        <i class="fas fa-folder-open fa-3x mb-3"></i>
        <h5>
          No posts added yet.
          <small>Check display settings too.</small>
        </h5>
        <p>When you add posts, it will appear here in your wall.</p>
      </div>
    }
    @for (item of displayList; let i = $index; track item) {
      <div class="col-12">
        <app-wall-card
          [wall]="item"
          [orgId]="orgId"
          [user]="user"
          [isLiked]="callIsLiked(item._id).bind(this)"
          [refresh]="callRefresh().bind(this)"
        />
      </div>
    }
  }
</div>
