<div class="card shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <app-user-avatar [user]="wall.user" />
      <div class="d-flex justify-content-between align-items-center mb-2">
        <small class="text-muted">
          <i class="fas fa-clock"></i>
          {{ wall.createdAt | date: 'medium' }}
        </small>
      </div>
    </div>

    <p class="mb-3">{{ wall.message }}</p>

    @if (!fromPreview) {
      <div class="d-flex justify-content-between align-items-center gap-1">
        <button
          class="btn btn-sm d-flex align-items-center gap-1"
          [ngClass]="isLiked(wall._id) ? 'btn-primary' : 'btn-outline-primary'"
          [class.active]="isLiked(wall._id)"
          (click)="isLiked(wall._id) ? unlike(wall._id) : like(wall._id)"
          aria-label="Like"
        >
          <i class="fas fa-thumbs-up"></i>
          <span>{{ wall.likedByUsers.length || 0 }}</span>
        </button>
        <div class="d-flex">
          <button
            class="btn btn-sm text-warning d-flex align-items-center"
            aria-label="Report"
            ngbTooltip="Report this post"
            (click)="report(wall._id)"
          >
            <i class="fas fa-exclamation-triangle"></i>
          </button>
          <button class="btn btn-sm text-danger d-flex align-items-center" aria-label="Delete" (click)="delete(wall._id)">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
    }

    <div class="mt-3 border-top pt-3" id="comments-{{ wall._id }}">
      <p class="fw-bold text-muted">Comments ({{ wall.comments.length }})</p>
      <div class="comments-container">
        @for (comment of wall.comments; track $index) {
          <div class="mb-2" id="comment-{{ comment._id }}">
            <app-comment-card [comment]="comment" [delete]="callDelete(comment._id)" />
          </div>
        }
      </div>

      @if (!fromPreview) {
        <div class="input-group mt-3">
          <input
            type="text"
            class="form-control"
            placeholder="Write a comment..."
            [(ngModel)]="newCommentText"
            (keyup.enter)="addComment(wall)"
          />
          <button class="btn btn-primary" [disabled]="!newCommentText" (click)="addComment(wall)"><i class="fas fa-add"></i></button>
        </div>
      }
    </div>
  </div>
</div>
